name: security-review
description: "Auto-triggers on security review prompts. Checks for OWASP Top 10 vulnerabilities and secure coding practices."
trigger:
  - "security review"
  - "security check"
  - "check vulnerabilities"
  - "owasp review"
instructions: |
  Perform a security review of the codebase, checking for OWASP Top 10 and common vulnerabilities:

  ## Backend (api/)
  1. **Injection** — Are all database queries parameterized via SQLAlchemy ORM (no raw SQL string concatenation)?
  2. **Broken Access Control** — Are endpoints properly scoped? (N/A for single-user, but check no admin-only routes are exposed)
  3. **Sensitive Data Exposure** — Are secrets in environment variables, not in code? Is .env in .gitignore?
  4. **Security Misconfiguration** — Is CORS restricted to expected origins? Are debug modes disabled for production?
  5. **Input Validation** — Are all request bodies validated via Pydantic schemas? Are path/query params typed?
  6. **Error Handling** — Do error responses avoid leaking stack traces or internal details?
  7. **Dependencies** — Are there known vulnerabilities in requirements.txt? (Check with `pip audit` if available)

  ## Frontend (web/)
  1. **XSS** — Is user input sanitized before rendering? Are dangerouslySetInnerHTML calls avoided?
  2. **Sensitive Data** — Are API keys or secrets absent from frontend code and .env files committed to git?
  3. **CSRF** — Are state-changing requests using proper HTTP methods (POST/PUT/DELETE, not GET)?
  4. **Dependencies** — Are there known vulnerabilities? (Check with `npm audit`)

  ## Output
  For each category, output:
  - PASS: no issues found
  - WARN: potential concern with recommendation
  - FAIL: vulnerability found with remediation steps
