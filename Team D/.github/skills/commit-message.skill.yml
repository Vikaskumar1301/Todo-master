name: commit-message
description: "Automatically generates a conventional commit message from staged git changes"
trigger:
  - "generate commit"
  - "commit message"
  - "write commit"
instructions: |
  Analyze the currently staged git changes using `git diff --cached`.
  Generate a commit message following Conventional Commits format:

  Format: <type>(<scope>): <short summary>

  Types: feat, fix, chore, docs, test, refactor
  Scope: api, web, config, db, or the specific module name
  Summary: imperative mood, lowercase, no period, max 72 chars

  If multiple changes span concerns, use the dominant type.
  Add a body paragraph only if the change is non-trivial.
  Output ONLY the commit message — no explanation or commentary.
