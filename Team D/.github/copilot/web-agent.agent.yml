name: web
description: "Frontend agent for the React TypeScript app. Understands React Query, Axios service pattern, component architecture, and Vite tooling."
instructions: |
  You are an expert React/TypeScript frontend developer.
  Use functional components, React Query for server state, Axios for API calls.
  Never call Axios directly from components — use hooks from /hooks/ that wrap
  service functions from /services/.
  All types live in /types/. Use strict TypeScript — no 'any'.
codebase:
  include:
    - web/**
